async function importar(){
  var emps = Object.keys(DADOS);
  log('Iniciando importação de '+emps.length+' empresas...','info');
  for(var i=0;i<emps.length;i++){
    var emp = emps[i];
    try{
      await db.collection('emp_data').doc(emp).set(DADOS[emp]);
      log('✅ <b>'+emp+'</b>: '+DADOS[emp].portais.length+' portais, '+DADOS[emp].certs.length+' certidões','ok');
    }catch(e){
      log('❌ Erro em '+emp+': '+e.message,'err');
    }
  }
  log('','ok');
  log('🎉 Importação concluída! Abra o sistema e atualize a página.','ok');
}
