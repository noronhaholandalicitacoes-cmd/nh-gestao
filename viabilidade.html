<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a; --surf:#141416; --surf2:#1c1c20; --line:#26262b; --line2:#323238;
  --txt:#ececee; --txt2:#9a9aa2; --txt3:#5c5c66;
  --nh:#f97316; --nh2:#fb923c;
  --sim:#22c55e; --nao:#ef4444; --ana:#eab308; --blue:#3b82f6;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(1200px 500px at 50% -10%,rgba(249,115,22,.08),transparent 70%);pointer-events:none;z-index:0}

/* Header */
.header{background:rgba(10,10,10,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:11px;min-width:0}
.logo-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--nh2),#ea580c);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#000;flex-shrink:0;box-shadow:0 4px 14px rgba(249,115,22,.35)}
.logo-info{min-width:0}
.logo-info .title{font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.02em}
.logo-info .sub{font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.badge-pend{background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(249,115,22,.08));color:var(--nh2);border:1px solid rgba(249,115,22,.35);padding:7px 14px;border-radius:22px;font-size:12px;font-weight:800;white-space:nowrap;flex-shrink:0}

/* Stats */
.stats{display:flex;gap:10px;padding:16px 18px 8px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.stats::-webkit-scrollbar{display:none}
.stat{background:linear-gradient(160deg,var(--surf),var(--bg));border:1px solid var(--line);border-radius:16px;padding:14px 16px;min-width:88px;flex-shrink:0;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--txt3));opacity:.9}
.stat.s-t{--accent:var(--nh)} .stat.s-p{--accent:var(--txt3)} .stat.s-a{--accent:var(--ana)} .stat.s-s{--accent:var(--sim)} .stat.s-n{--accent:var(--nao)}
.stat-n{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.03em}
.stat-l{font-size:10.5px;color:var(--txt3);margin-top:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* Filtros */
.filtros-wrap{padding:8px 18px 14px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.filtros-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filtros-row::-webkit-scrollbar{display:none}
.filtro-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:700}
.f-btn{background:var(--surf);border:1px solid var(--line);color:var(--txt2);padding:9px 16px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:Outfit,sans-serif;transition:all .18s;flex-shrink:0}
.f-btn:active{transform:scale(.95)}
.f-btn.on{background:linear-gradient(135deg,rgba(249,115,22,.18),rgba(249,115,22,.08));border-color:rgba(249,115,22,.45);color:var(--nh2)}
.f-btn.on-sim{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.45);color:var(--sim)}
.f-btn.on-nao{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.45);color:var(--nao)}
.f-btn.on-analise{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.45);color:var(--ana)}
.f-btn.on-antunes{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.4);color:var(--ana)}
.f-btn.on-noronha{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:var(--blue)}

/* Cards */
.cards{padding:4px 18px 120px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.card{background:var(--surf);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:border .2s,transform .2s,box-shadow .2s;position:relative}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--txt3);opacity:.5}
.card.sim::before{background:linear-gradient(180deg,var(--sim),#16a34a);opacity:1}
.card.nao::before{background:linear-gradient(180deg,var(--nao),#dc2626);opacity:1}
.card.analise::before{background:linear-gradient(180deg,var(--ana),#ca8a04);opacity:1}
.card.sim{border-color:rgba(34,197,94,.3)}
.card.nao{border-color:rgba(239,68,68,.3)}
.card.analise{border-color:rgba(234,179,8,.35);box-shadow:0 0 0 1px rgba(234,179,8,.12),0 6px 20px rgba(234,179,8,.06)}

.card-head{padding:18px 18px 12px 22px}
.card-top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.card-emp{font-size:12px;font-weight:800;padding:5px 13px;border-radius:20px;flex-shrink:0;letter-spacing:.02em}
.tag-antunes{background:linear-gradient(135deg,var(--ana),#ca8a04);color:#000;font-size:11px;font-weight:900;padding:5px 12px;border-radius:20px;flex-shrink:0;letter-spacing:.03em}
.tag-noronha{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-size:11px;font-weight:900;padding:5px 12px;border-radius:20px;flex-shrink:0;letter-spacing:.03em}
.tag-ambos{background:linear-gradient(135deg,var(--nh),#ea580c);color:#000;font-size:11px;font-weight:900;padding:5px 12px;border-radius:20px;flex-shrink:0;letter-spacing:.03em}

.status-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:700;flex-shrink:0;margin-left:auto}
.s-sim{background:rgba(34,197,94,.15);color:var(--sim)}
.s-nao{background:rgba(239,68,68,.15);color:var(--nao)}
.s-analise{background:rgba(234,179,8,.15);color:var(--ana)}
.s-analise .dot{width:7px;height:7px;border-radius:50%;background:var(--ana);animation:pulse 1.2s ease-in-out infinite}
.s-pend{background:rgba(120,120,130,.1);color:var(--txt3);border:1px solid var(--line)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.25)}}

.card-licit{font-size:16px;font-weight:700;color:var(--txt);line-height:1.5;letter-spacing:-.01em}
.card-meta{padding:0 18px 14px 22px;display:flex;flex-wrap:wrap;gap:8px}
.meta-tag{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:13px;color:var(--txt2);display:inline-flex;align-items:center;gap:5px}
.meta-tag.val{color:var(--nh2);border-color:rgba(249,115,22,.25);font-weight:700}
.meta-tag.obj{color:var(--txt2);width:100%;line-height:1.6;white-space:normal;align-items:flex-start}
.meta-link{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.28);color:#60a5fa;border-radius:10px;padding:6px 13px;font-size:13px;font-weight:600;text-decoration:none}
.meta-link:active{opacity:.7}

/* Ações */
.card-acoes{padding:2px 18px 18px 22px}
.btns-part{display:flex;gap:9px;margin-bottom:14px}
.btn-part{flex:1;padding:14px 4px;border-radius:14px;border:2px solid var(--line);font-size:14px;font-weight:800;cursor:pointer;font-family:Outfit,sans-serif;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--bg);color:var(--txt3)}
.btn-part:active{transform:scale(.95)}
.btn-part.on-sim{border-color:var(--sim);background:rgba(34,197,94,.15);color:var(--sim);box-shadow:0 4px 14px rgba(34,197,94,.15)}
.btn-part.on-nao{border-color:var(--nao);background:rgba(239,68,68,.15);color:var(--nao);box-shadow:0 4px 14px rgba(239,68,68,.15)}
.btn-part.on-analise{border-color:var(--ana);background:rgba(234,179,8,.15);color:var(--ana);box-shadow:0 4px 14px rgba(234,179,8,.15)}

/* Justificativa */
.just-wrap{position:relative}
.just-label{font-size:11px;color:var(--txt3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.just-area{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;color:var(--txt);font-family:Outfit,sans-serif;font-size:15px;padding:13px 15px;resize:vertical;min-height:88px;outline:none;transition:border .2s;line-height:1.55}
.just-area:focus{border-color:rgba(249,115,22,.5)}
.just-area:disabled{opacity:.3;cursor:not-allowed}
.aviso-salvar{font-size:13px;color:var(--ana);margin-top:10px;display:none;text-align:center;font-weight:600;padding:9px;background:rgba(234,179,8,.08);border-radius:10px;border:1px solid rgba(234,179,8,.2)}
.btn-salvar{width:100%;margin-top:11px;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:Outfit,sans-serif;transition:all .2s;background:var(--surf2);color:var(--txt3)}
.btn-salvar.ativo{background:linear-gradient(135deg,var(--nh2),#ea580c);color:#000;box-shadow:0 6px 20px rgba(249,115,22,.3)}
.btn-salvar.ativo:active{opacity:.85;transform:scale(.98)}
.btn-salvar:disabled{cursor:not-allowed}

/* Loading / vazio */
.loading{text-align:center;padding:70px 20px;color:var(--txt3);position:relative;z-index:1}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--nh);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 24px;color:var(--txt3);font-size:14px;position:relative;z-index:1}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.5}

/* Toast */
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line2);border-radius:12px;padding:12px 22px;font-size:14px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.7);max-width:90vw;text-align:center}
.toast.ok{border-color:rgba(34,197,94,.5);color:var(--sim)}
.toast.err{border-color:rgba(239,68,68,.5);color:var(--nao)}

/* ══════════════════════════════════════════════════════════════════
   NH DEPTH — camada de profundidade compartilhada entre o Sistema, o
   Portal de Contratos e o Viabilidade. A luz vem sempre do canto
   superior esquerdo. A ousadia mora nos cartões de indicador; os
   painéis de comparação seguem planos, para não distorcer dados.
   ══════════════════════════════════════════════════════════════════ */
:root{
  --nhd-e1:0 1px 2px rgba(0,0,0,.4), 0 2px 8px -2px rgba(0,0,0,.35);
  --nhd-e2:0 2px 4px rgba(0,0,0,.45), 0 12px 28px -8px rgba(0,0,0,.55);
  --nhd-e3:0 4px 8px rgba(0,0,0,.5), 0 28px 56px -16px rgba(0,0,0,.7);
  --nhd-bevel:rgba(255,255,255,.16);
  --nhd-spec:rgba(255,255,255,.09);
}

/* Atmosfera: esferas de luz em deriva lenta sobre uma malha discreta.
   z-index negativo — pinta acima do fundo do body e abaixo de todo o
   conteúdo, sem depender do empilhamento de cada tela. */
#nhd-atmosfera{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
#nhd-atmosfera .nhd-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
#nhd-atmosfera .nhd-o1{width:620px;height:620px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 68%);top:-16%;left:-8%;animation:nhdDeriva1 26s ease-in-out infinite}
#nhd-atmosfera .nhd-o2{width:540px;height:540px;background:radial-gradient(circle,rgba(59,130,246,.21),transparent 68%);top:24%;right:-10%;animation:nhdDeriva2 32s ease-in-out infinite}
#nhd-atmosfera .nhd-o3{width:460px;height:460px;background:radial-gradient(circle,rgba(168,85,247,.18),transparent 68%);bottom:-12%;left:32%;animation:nhdDeriva3 29s ease-in-out infinite}
#nhd-atmosfera .nhd-grade{position:absolute;inset:0;opacity:.32;
  background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(ellipse 78% 62% at 50% 42%,#000 35%,transparent 100%);
  mask-image:radial-gradient(ellipse 78% 62% at 50% 42%,#000 35%,transparent 100%);}
@keyframes nhdDeriva1{0%,100%{transform:translate(0,0)}50%{transform:translate(70px,50px)}}
@keyframes nhdDeriva2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,60px)}}
@keyframes nhdDeriva3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-45px)}}

/* Cartões de indicador: elevação + inclinação seguindo o cursor */
.stat{
  box-shadow:var(--nhd-e2);
  transform-style:preserve-3d;
  will-change:transform;
  transition:box-shadow .3s cubic-bezier(.22,1,.36,1);
}
/* Bisel: fio de luz na borda superior, como uma quina captando luz */
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:3;
  background:linear-gradient(90deg,transparent,var(--nhd-bevel) 22%,rgba(255,255,255,.05) 70%,transparent);
}
/* Reflexo especular: acompanha o ponteiro, como vidro sob uma lâmpada */
.stat::after{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:0;z-index:2;
  background:radial-gradient(340px circle at var(--nhd-mx,50%) var(--nhd-my,50%),var(--nhd-spec),transparent 62%);
  transition:opacity .3s;
}
.stat:hover::after{opacity:1}
.stat:hover{box-shadow:var(--nhd-e3)}

/* Cartões de lista: mesma lógica de luz, em intensidade menor */
.card{
  box-shadow:var(--nhd-e1);
  transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .25s,border-color .2s;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--nhd-e2)}

@media (prefers-reduced-motion:reduce){
  #nhd-atmosfera .nhd-orb{animation:none}
  .stat,.card{transition:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">NH</div>
    <div class="logo-info">
      <div class="title">NH Licitações</div>
      <div class="sub">Análise de Viabilidade</div>
    </div>
  </div>
  <div class="badge-pend" id="badge-pend">...</div>
</div>

<div class="stats">
  <div class="stat s-t"><div class="stat-n" style="color:var(--nh)" id="st-total">—</div><div class="stat-l">Total</div></div>
  <div class="stat s-p"><div class="stat-n" style="color:var(--txt2)" id="st-pend">—</div><div class="stat-l">Pendentes</div></div>
  <div class="stat s-a"><div class="stat-n" style="color:var(--ana)" id="st-ana">—</div><div class="stat-l">Em Análise</div></div>

  <div class="stat s-n"><div class="stat-n" style="color:var(--nao)" id="st-nao">—</div><div class="stat-l">Recusados</div></div>
</div>

<div class="filtros-wrap">
  <div>
    <div class="filtro-label">Status</div>
    <div class="filtros-row" id="filtros-status">
      <button class="f-btn" id="fb-pend" onclick="setFiltroStatus('pendente',this)">⏳ Pendentes</button>
      <button class="f-btn" id="fb-ana" onclick="setFiltroStatus('analise',this)">🔍 Em Análise</button>
      <button class="f-btn" id="fb-todos" onclick="setFiltroStatus('todos',this)">Todos</button>
      <button class="f-btn" id="fb-sim" onclick="setFiltroStatus('sim',this)">✅ SIM</button>
      <button class="f-btn" id="fb-nao" onclick="setFiltroStatus('nao',this)">❌ NÃO</button>
    </div>
  </div>
  <div>
    <div class="filtro-label">Responsável</div>
    <div class="filtros-row" id="filtros-resp">
      <button class="f-btn on" id="fr-todos" onclick="setFiltroResp('todos',this)">Todos</button>
      <button class="f-btn" id="fr-antunes" onclick="setFiltroResp('ANTUNES',this)">⭐ ANTUNES</button>
      <button class="f-btn" id="fr-noronha" onclick="setFiltroResp('NORONHA',this)">🔵 NORONHA</button>
    </div>
  </div>
  <div>
    <div class="filtro-label">Empresa</div>
    <div class="filtros-row" id="filtros-emp">
      <button class="f-btn on" id="fe-todos" onclick="setFiltroEmp('todos',this)">Todas</button>
    </div>
  </div>
</div>

<div id="main-content">
  <div class="loading"><div class="spin"></div>Carregando editais...</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBhcpJP9dRM0SEJsGfcNUXYb1rTMdEDw6M",authDomain:"nh-licitacoes.firebaseapp.com",projectId:"nh-licitacoes",storageBucket:"nh-licitacoes.firebasestorage.app",messagingSenderId:"1081646053691",appId:"1:1081646053691:web:a8abcb5792d026ade71f1e"};
(function(){try{if(!localStorage.getItem("nh_idb_limpo_v1")){var _dbs=["firestore/[DEFAULT]/nh-licitacoes/main","firebaseLocalStorageDb"];if(window.indexedDB&&indexedDB.databases){indexedDB.databases().then(function(list){(list||[]).forEach(function(d){if(d&&d.name&&d.name.indexOf("firestore")!==-1){try{indexedDB.deleteDatabase(d.name);}catch(e){}}});});}else{_dbs.forEach(function(n){try{indexedDB.deleteDatabase(n);}catch(e){}});}localStorage.setItem("nh_idb_limpo_v1","1");}}catch(e){}})();firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
db.settings({experimentalAutoDetectLongPolling:true,merge:true});

var TODOS=[];
var FILTRO_STATUS='pendente';
var FILTRO_RESP='todos';
var FILTRO_EMP='todos';

var EMP_CORES={'VISE':'#eab308','SAUTEC':'#3b82f6','SOS':'#22c55e','SOS FILIAL':'#ef4444','ONLAV':'#06b6d4','ENGEMED':'#ec4899','POTIGUAR':'#f97316'};
// Cores reais vêm do Firebase (config/empresas) — o objeto acima é só fallback
// de segurança para o caso de falha de conexão antes do fetch completar.
async function carregarCoresEmpresas(){
  try{
    var snap=await db.collection('config').doc('empresas').get();
    if(snap.exists&&snap.data().lista){
      snap.data().lista.forEach(function(emp){
        if(emp.nome&&emp.cor) EMP_CORES[emp.nome.toUpperCase().trim()]=emp.cor;
      });
    }
  }catch(e){/* mantém fallback em caso de erro */}
}

var _pendentes={};

function toast(msg,tipo){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(tipo||'ok'); t.style.display='block';
  setTimeout(function(){t.style.display='none';},2500);
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function parseMoeda(v){
  var s=String(v||'').replace(/R\$\s*/g,'').replace(/\s/g,'').trim();
  if(!s) return 0;
  if(s.indexOf(',')!==-1) s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/[^\d.]/g,'');
  return parseFloat(s)||0;
}
function fmtMoeda(n){
  if(!n) return '';
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function isAnalise(p){var s=String(p||'').toUpperCase().trim();return s==='EM ANÁLISE'||s==='EM ANALISE'||s==='ANÁLISE'||s==='ANALISE';}
function isSim(p){return String(p||'').toUpperCase().trim()==='SIM';}
function isNao(p){var s=String(p||'').toUpperCase().trim();return s==='NÃO'||s==='NAO';}

async function carregar(){
  try{
    await carregarCoresEmpresas();
    var snap=await db.collection('editais').orderBy('_id','desc').get();
    TODOS=[];
    snap.forEach(function(doc){
      var d=doc.data();
      if(d._arr) TODOS.push({id:doc.id,_id:d._id,arr:d._arr});
    });
    TODOS.sort(function(a,b){return b._id-a._id;});
    buildFiltrosEmpresas();
    document.getElementById('fb-pend').classList.add('on');
    renderizar();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div>Erro ao carregar: '+esc(e.message)+'</div>';
  }
}

function buildFiltrosEmpresas(){
  var emps={};
  TODOS.forEach(function(d){var e=String(d.arr[2]||'').trim();if(e)emps[e]=true;});
  var wrap=document.getElementById('filtros-emp');
  Object.keys(emps).sort().forEach(function(emp){
    var btn=document.createElement('button');
    btn.className='f-btn';
    btn.textContent=emp;
    btn.setAttribute('data-emp',emp);
    btn.onclick=function(){setFiltroEmp(emp,btn);};
    wrap.appendChild(btn);
  });
}

function setFiltroStatus(f,btn){
  FILTRO_STATUS=f;
  document.querySelectorAll('#filtros-status .f-btn').forEach(function(b){b.classList.remove('on','on-sim','on-nao','on-analise');});
  if(f==='sim') btn.classList.add('on-sim');
  else if(f==='nao') btn.classList.add('on-nao');
  else if(f==='analise') btn.classList.add('on-analise');
  else btn.classList.add('on');
  renderizar();
}
function setFiltroResp(f,btn){
  FILTRO_RESP=f;
  document.querySelectorAll('#filtros-resp .f-btn').forEach(function(b){b.classList.remove('on','on-antunes','on-noronha');});
  if(f==='ANTUNES') btn.classList.add('on-antunes');
  else if(f==='NORONHA') btn.classList.add('on-noronha');
  else btn.classList.add('on');
  renderizar();
}
function setFiltroEmp(f,btn){
  FILTRO_EMP=f;
  document.querySelectorAll('#filtros-emp .f-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderizar();
}

function getFiltrados(){
  return TODOS.filter(function(d){
    var part=String(d.arr[10]||'').toUpperCase().trim();
    var resp=String(d.arr[9]||'').toUpperCase().trim();
    var emp=String(d.arr[2]||'').trim();
    if(FILTRO_STATUS==='pendente' && (part!=='' && !isAnalise(part))) return false;
    if(FILTRO_STATUS==='pendente' && isAnalise(part)) return false;
    if(FILTRO_STATUS==='analise' && !isAnalise(part)) return false;
    if(FILTRO_STATUS==='sim' && !isSim(part)) return false;
    if(FILTRO_STATUS==='nao' && !isNao(part)) return false;
    if(FILTRO_RESP==='ANTUNES' && resp.indexOf('ANTUNES')===-1) return false;
    if(FILTRO_RESP==='NORONHA' && resp.indexOf('NORONHA')===-1) return false;
    if(FILTRO_EMP!=='todos' && emp!==FILTRO_EMP) return false;
    return true;
  });
}

function atualizarStats(){
  var pend=TODOS.filter(function(d){var p=String(d.arr[10]||'').trim();return !p;}).length;
  var ana=TODOS.filter(function(d){return isAnalise(d.arr[10]);}).length;
  var sim=TODOS.filter(function(d){return isSim(d.arr[10]);}).length;
  var nao=TODOS.filter(function(d){return isNao(d.arr[10]);}).length;
  document.getElementById('st-total').textContent=TODOS.length;
  document.getElementById('st-pend').textContent=pend;
  document.getElementById('st-ana').textContent=ana;
  document.getElementById('st-sim').textContent=sim;
  document.getElementById('st-nao').textContent=nao;
  var acao=pend+ana;
  document.getElementById('badge-pend').textContent=acao+' p/ avaliar';
}

function renderizar(){
  atualizarStats();
  var lista=getFiltrados();
  if(!lista.length){
    document.getElementById('main-content').innerHTML='<div class="empty"><div class="empty-ico">📭</div>Nenhum edital neste filtro</div>';
    return;
  }
  var wrap=document.createElement('div');
  wrap.className='cards';
  wrap.innerHTML=lista.map(function(d){return renderCard(d);}).join('');
  document.getElementById('main-content').innerHTML='';
  document.getElementById('main-content').appendChild(wrap);
}

function renderCard(d){
  var arr=d.arr;
  var id=d.id;
  var emp=String(arr[2]||'').trim();
  var licit=String(arr[3]||'').trim();
  var obj=String(arr[4]||'').trim();
  var local=String(arr[5]||'').trim();
  var mun=String(arr[6]||'').trim();
  var val=parseMoeda(arr[7]);
  var resp=String(arr[9]||'').toUpperCase().trim();
  var part=String(arr[10]||'').toUpperCase().trim();
  var just=String(arr[12]||'').trim();
  var linkPub=String(arr[13]||'').trim();

  var empCor=EMP_CORES[emp]||'#f97316';
  var cardCls=isSim(part)?'sim':isNao(part)?'nao':isAnalise(part)?'analise':'';

  var tagResp='';
  var isAnt=resp.indexOf('ANTUNES')!==-1;
  var isNor=resp.indexOf('NORONHA')!==-1;
  if(isAnt&&isNor) tagResp='<span class="tag-ambos">⭐🔵 ANTUNES & NORONHA</span>';
  else if(isAnt) tagResp='<span class="tag-antunes">⭐ ANTUNES</span>';
  else if(isNor) tagResp='<span class="tag-noronha">🔵 NORONHA</span>';

  var pill='<span class="status-pill s-pend">— Pendente</span>';
  if(isSim(part)) pill='<span class="status-pill s-sim">✓ Participar</span>';
  else if(isNao(part)) pill='<span class="status-pill s-nao">✕ Recusado</span>';
  else if(isAnalise(part)) pill='<span class="status-pill s-analise"><span class="dot"></span>Em Análise</span>';

  var temPart = part!=='';
  var justDisabled = !temPart ? 'disabled' : '';

  return '<div class="card '+cardCls+'" id="card-'+id+'">'+
    '<div class="card-head">'+
      '<div class="card-top-row">'+
        '<span class="card-emp" style="background:'+empCor+'22;color:'+empCor+';border:1px solid '+empCor+'44">'+esc(emp)+'</span>'+
        tagResp+
        pill+
      '</div>'+
      '<div class="card-licit">'+esc(licit)+'</div>'+
    '</div>'+
    '<div class="card-meta">'+
      (obj?'<span class="meta-tag obj">'+esc(obj.substring(0,180))+(obj.length>180?'…':'')+'</span>':'')+
      (local?'<span class="meta-tag">📍 '+esc(local)+(mun?' · '+esc(mun):'')+'</span>':'')+
      (val>0?'<span class="meta-tag val">💰 '+fmtMoeda(val)+'</span>':'')+
      (linkPub?'<a href="'+esc(linkPub)+'" target="_blank" rel="noopener" class="meta-link" onclick="event.stopPropagation()">📄 Consultar Edital / TR</a>':'')+
    '</div>'+
    '<div class="card-acoes">'+
      '<div class="btns-part">'+
        '<button class="btn-part'+(isSim(part)?' on-sim':'')+'" onclick="selecionarVoto(\''+id+'\',\'SIM\')">✅ SIM</button>'+
        '<button class="btn-part'+(isNao(part)?' on-nao':'')+'" onclick="selecionarVoto(\''+id+'\',\'NÃO\')">❌ NÃO</button>'+
        '<button class="btn-part'+(isAnalise(part)?' on-analise':'')+'" style="font-size:12px" onclick="selecionarVoto(\''+id+'\',\'EM ANÁLISE\')">🔍 ANÁLISE</button>'+
      '</div>'+
      '<div class="just-wrap">'+
        '<div class="just-label">Justificativa / Observação</div>'+
        '<textarea class="just-area" id="just-'+id+'" '+justDisabled+' '+
          'placeholder="'+(temPart?'Escreva uma justificativa...':'Selecione SIM, NÃO ou ANÁLISE primeiro')+'">'+esc(just)+'</textarea>'+
        '<div class="aviso-salvar" id="aviso-'+id+'">⚠️ Alteração pendente — clique em Salvar</div>'+
        '<button class="btn-salvar'+(temPart?' ativo':'')+'" id="btn-'+id+'" '+(temPart?'':'disabled')+' onclick="salvar(\''+id+'\')">💾 Salvar</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function selecionarVoto(id, valor){
  var d=TODOS.find(function(x){return x.id===id;});
  if(!d) return;
  if(!_pendentes[id]) _pendentes[id]={};
  _pendentes[id].part = valor;

  var card=document.getElementById('card-'+id);
  if(!card) return;
  card.querySelectorAll('.btn-part').forEach(function(b){b.classList.remove('on-sim','on-nao','on-analise');});
  if(valor==='SIM') card.querySelectorAll('.btn-part')[0].classList.add('on-sim');
  else if(valor==='NÃO') card.querySelectorAll('.btn-part')[1].classList.add('on-nao');
  else card.querySelectorAll('.btn-part')[2].classList.add('on-analise');

  var just=document.getElementById('just-'+id);
  if(just){ just.disabled=false; just.placeholder='Escreva uma justificativa...'; }
  var btn=document.getElementById('btn-'+id);
  if(btn){ btn.disabled=false; btn.className='btn-salvar ativo'; }

  var aviso=document.getElementById('aviso-'+id);
  if(aviso) aviso.style.display='block';

  var pill=card.querySelector('.status-pill');
  if(pill){
    if(valor==='SIM') pill.outerHTML='<span class="status-pill s-sim">✓ Participar</span>';
    else if(valor==='NÃO') pill.outerHTML='<span class="status-pill s-nao">✕ Recusado</span>';
    else pill.outerHTML='<span class="status-pill s-analise"><span class="dot"></span>Em Análise</span>';
  }
  // atualizar borda do card imediatamente
  card.className='card '+(valor==='SIM'?'sim':valor==='NÃO'?'nao':'analise');
}

async function salvar(id){
  var d=TODOS.find(function(x){return x.id===id;});
  if(!d) return;

  var btn=document.getElementById('btn-'+id);
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  var arr=d.arr.slice();
  if(_pendentes[id]&&_pendentes[id].part) arr[10]=_pendentes[id].part;
  var just=document.getElementById('just-'+id);
  if(just) arr[12]=just.value.trim();

  try{
    await db.collection('editais').doc(id).set({_id:d._id,_arr:arr});
    d.arr=arr;
    delete _pendentes[id];

    var aviso=document.getElementById('aviso-'+id);
    if(aviso) aviso.style.display='none';

    var card=document.getElementById('card-'+id);
    var part=String(arr[10]||'').toUpperCase().trim();
    if(card){
      card.className='card '+(isSim(part)?'sim':isNao(part)?'nao':isAnalise(part)?'analise':'');
    }

    atualizarStats();
    toast('✅ Salvo com sucesso!','ok');
  }catch(e){
    toast('Erro ao salvar: '+e.message,'err');
    if(btn){btn.disabled=false;btn.textContent='💾 Salvar';}
    return;
  }

  if(btn){btn.disabled=false;btn.textContent='💾 Salvar';}
}

carregar();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw-viabilidade.js').catch(function(){});
}
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   NH DEPTH — comportamento: monta a atmosfera de fundo e liga a
   inclinação/reflexo dos cartões de indicador. Igual nos três
   sistemas. Respeita a preferência de "reduzir movimento".
   ══════════════════════════════════════════════════════════════════ */
(function(){
  var SEL='.stat';
  var podeAnimar=!(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches);

  function montarAtmosfera(){
    if(document.getElementById('nhd-atmosfera'))return;
    var a=document.createElement('div');
    a.id='nhd-atmosfera';
    a.innerHTML='<div class="nhd-orb nhd-o1"></div><div class="nhd-orb nhd-o2"></div>'
               +'<div class="nhd-orb nhd-o3"></div><div class="nhd-grade"></div>';
    document.body.insertBefore(a,document.body.firstChild);
  }

  function ligar(card){
    if(card._nhdOn)return; card._nhdOn=1;
    if(!podeAnimar)return;
    card.addEventListener('mousemove',function(e){
      var r=card.getBoundingClientRect();
      var px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
      card.style.setProperty('--nhd-mx',(px*100)+'%');
      card.style.setProperty('--nhd-my',(py*100)+'%');
      card.style.transform='perspective(1000px) rotateX('+((0.5-py)*7).toFixed(2)+'deg) rotateY('+((px-0.5)*9).toFixed(2)+'deg) translateZ(10px)';
    });
    card.addEventListener('mouseleave',function(){
      card.style.transition='transform .5s cubic-bezier(.22,1,.36,1),box-shadow .3s';
      card.style.transform='perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0)';
      setTimeout(function(){card.style.transition='box-shadow .3s cubic-bezier(.22,1,.36,1)';},520);
    });
  }

  function varrer(){
    try{
      var els=document.querySelectorAll(SEL);
      for(var i=0;i<els.length;i++)ligar(els[i]);
    }catch(e){}
  }

  function iniciar(){
    montarAtmosfera();
    varrer();
    /* Os painéis são redesenhados o tempo todo (troca de aba, filtro,
       período). O observador liga os cartões novos assim que surgem,
       com freio de um quadro para não pesar em telas movimentadas. */
    try{
      var agendado=false;
      var mo=new MutationObserver(function(){
        if(agendado)return; agendado=true;
        requestAnimationFrame(function(){agendado=false;varrer();});
      });
      mo.observe(document.body,{childList:true,subtree:true});
    }catch(e){}
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',iniciar);
  else iniciar();
})();
</script>
